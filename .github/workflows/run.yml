name: Fetch SAM Data

on:
  schedule:
    - cron: '0 10 * * *'   # 6 AM Eastern
    - cron: '0 15 * * *'   # 11 AM Eastern
  workflow_dispatch:      # lets you run it manually

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: |
          python -V
          python fetch.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sam_data.json
          git commit -m "Update SAM data" || echo "No changes"
          git push
